<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LSWA — LeadSync WhatsApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        /* ── Backgrounds ── */
        --bg:           #04030e;
        --bg-2:         #0a0820;
        --bg-3:         #120a2e;
        --surface:      rgba(10, 18, 32, 0.82);
        --surface-2:    rgba(20, 12, 45, 0.90);
        --glass:        rgba(7, 5, 18, 0.72);

        /* ── Brand (LeadSync purple/violet) ── */
        --purple:       #8b5cf6;
        --purple-deep:  #6d28d9;
        --purple-light: #a78bfa;
        --pink:         #ec4899;
        --cyan:         #06b6d4;
        --grad:         linear-gradient(135deg, #6d28d9, #8b5cf6, #a855f7, #ec4899);
        --grad-text:    linear-gradient(130deg, #c4b5fd, #e879f9, #f472b6);

        /* ── WhatsApp green ── */
        --wa:           #25D366;
        --wa-dark:      #128C7E;
        --wa-glass:     rgba(37, 211, 102, 0.12);
        --wa-border:    rgba(37, 211, 102, 0.28);

        /* ── Text ── */
        --text:         #ede9ff;
        --text-2:       #c4b5fd;
        --muted:        rgba(196, 181, 253, 0.55);
        --faint:        rgba(196, 181, 253, 0.35);

        /* ── Borders ── */
        --border:       rgba(148, 163, 184, 0.14);
        --border-2:     rgba(139, 92, 246, 0.22);
        --border-hover: rgba(139, 92, 246, 0.55);

        /* ── Semantic ── */
        --danger:       #f87171;
        --warning:      #fbbf24;
        --success:      #34d399;

        /* ── Shadows ── */
        --shadow:       0 24px 80px rgba(2, 6, 23, 0.55);
        --glow:         0 0 30px rgba(124, 58, 237, 0.4);
        --glow-wa:      0 0 24px rgba(37, 211, 102, 0.3);

        /* ── Shape ── */
        --r-sm: 8px;
        --r-md: 12px;
        --r-lg: 16px;
        --r-xl: 24px;
        --r-full: 9999px;
      }

      body {
        font-family: 'JetBrains Mono', 'Courier New', monospace;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        background-image:
          radial-gradient(ellipse at 15% 40%, rgba(124, 58, 237, 0.18) 0%, transparent 55%),
          radial-gradient(ellipse at 85% 15%, rgba(236, 72, 153, 0.13) 0%, transparent 50%),
          radial-gradient(ellipse at 60% 85%, rgba(45, 212, 191, 0.08) 0%, transparent 45%);
        background-attachment: fixed;
      }

      #root { min-height: 100vh; }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: var(--bg-2); }
      ::-webkit-scrollbar-thumb { background: rgba(139, 92, 246, 0.4); border-radius: 3px; }

      /* ── Utilities ── */
      .grad-text {
        background: var(--grad-text);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .glass-card {
        background: var(--surface);
        border: 1px solid var(--border-2);
        border-radius: var(--r-lg);
        backdrop-filter: blur(20px);
      }
      .btn-primary {
        padding: 11px 24px;
        background: var(--grad);
        color: #fff;
        border: none;
        border-radius: var(--r-md);
        font-family: 'JetBrains Mono', monospace;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s, transform 0.15s;
        letter-spacing: -0.01em;
        text-decoration: none;
        display: inline-block;
      }
      .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
      .btn-wa {
        padding: 11px 24px;
        background: var(--wa);
        color: #000;
        border: none;
        border-radius: var(--r-md);
        font-family: 'JetBrains Mono', monospace;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s, transform 0.15s, box-shadow 0.15s;
        text-decoration: none;
        display: inline-block;
      }
      .btn-wa:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: var(--glow-wa); }
      .btn-ghost {
        padding: 11px 24px;
        background: transparent;
        color: var(--text-2);
        border: 1px solid var(--border-2);
        border-radius: var(--r-md);
        font-family: 'JetBrains Mono', monospace;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: border-color 0.15s, background 0.15s;
        text-decoration: none;
        display: inline-block;
      }
      .btn-ghost:hover { border-color: var(--border-hover); background: rgba(139, 92, 246, 0.08); }

      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .wa-text { color: var(--wa); font-family: 'JetBrains Mono', monospace; }

      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
      @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
      @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
